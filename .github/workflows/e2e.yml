name: E2E pipeline tests

on:
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 03:30 UTC — full all-pipeline run
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Pipeline to run"
        required: true
        default: "all"
        type: choice
        options: [audit, cennik, summary, competitor, versum, all]
      salons:
        description: "Number of salons to sample"
        required: true
        default: "3"
        type: string

# E2E tests share a single sequence of MiniMax/Supabase calls — don't
# parallelise across PRs to avoid hitting rate limits.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
  MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
  MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}
  BEXTRACT_API_URL: ${{ secrets.BEXTRACT_API_URL }}
  BEXTRACT_API_KEY: ${{ secrets.BEXTRACT_API_KEY }}

jobs:
  # ---------------------------------------------------------------------
  # Pre-merge: cheap deterministic tests only (no AI cost)
  # Runs on every PR. Should always pass.
  # ---------------------------------------------------------------------
  pre-merge-fast:
    name: "Fast E2E (no AI cost)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Discovery pump regression
        run: uv run pytest tests/e2e/test_discovery_pump_regression.py -v -m e2e

      - name: Webhook contract tests
        run: uv run pytest tests/e2e/test_webhook_contracts.py -v -m e2e

      - name: Score cap audit (static)
        run: uv run pytest tests/e2e/test_score_cap_audit.py -v -m e2e

      - name: HTTP/2 cascade regression (live Supabase reads)
        run: uv run pytest tests/e2e/test_http2_cascade_regression.py -v -m e2e

  # ---------------------------------------------------------------------
  # Nightly: full E2E with AI calls. Real cost, real coverage.
  # ---------------------------------------------------------------------
  nightly-full:
    name: "Nightly full E2E (with AI)"
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      E2E_SEED: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Restore baseline
        uses: actions/cache@v4
        with:
          path: .e2e-baseline.json
          key: e2e-baseline-${{ github.ref }}-${{ github.run_number }}
          restore-keys: |
            e2e-baseline-${{ github.ref }}-
            e2e-baseline-

      - name: Run E2E (audit + cennik + summary + versum)
        run: |
          uv run python -m tests.e2e.runner \
            --pipeline all \
            --salons 5 \
            --report e2e-results.json \
            --baseline .e2e-baseline.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.run_number }}
          path: |
            e2e-results.json
            .e2e-baseline.json
          retention-days: 30

      - name: Save baseline
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .e2e-baseline.json
          key: e2e-baseline-${{ github.ref }}-${{ github.run_number }}

  # ---------------------------------------------------------------------
  # Manual dispatch: pick pipeline + salons interactively
  #
  # SECURITY: workflow_dispatch inputs are constrained by GitHub's input
  # type validation (choice enum + string), but we still pipe through
  # env vars rather than direct ${{ inputs.* }} interpolation in `run:`
  # to avoid any future command-injection risk.
  # ---------------------------------------------------------------------
  manual:
    name: "Manual E2E run"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      INPUT_PIPELINE: ${{ inputs.pipeline }}
      INPUT_SALONS: ${{ inputs.salons }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - name: Run E2E
        run: |
          uv run python -m tests.e2e.runner \
            --pipeline "$INPUT_PIPELINE" \
            --salons "$INPUT_SALONS" \
            --report e2e-results.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-manual-${{ github.run_number }}
          path: e2e-results.json
          retention-days: 14
